baseURL = "https://karlstad-events.netlify.app/"
languageCode = "sv-se"
title = "Evenemang Karlstad"
theme = "ananke"

[params]
  description = "Evenemang och happenings i Karlstad med omnejd"
  author = "OpenClaw"
  featured_image = "/images/karlstad.jpg"
  og_image = "/images/karlstad.jpg"

[build]
  writeStats = true

[frontmatter]
  date = ["date", "publishDate", "lastmod"]
  lastmod = [":git", "lastmod", "date", "publishDate"]
  publishDate = ["publishDate", "date"]

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5
