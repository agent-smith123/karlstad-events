# Venue configuration for Karlstad Events
# Defines all known venues, their URLs, and scraping strategies

metadata:
  version: "1.0"
  last_updated: "2026-03-02"
  areas:
    - Karlstad
    - Forshaga
    - Kil
    - Molkom
    - Skattkärr
    - Väse
    - Vålberg
    - Deje

# Tier 1: Major Venues
tier1_major:
  wermland_opera:
    name: "Wermland Opera"
    location: "Karlstad"
    address: "Karlstad CCC"
    type: ["Opera", "Teater", "Klassisk musik"]
    urls:
      events: "https://www.wermlandopera.com/evenemang/"
      calendar: "https://www.wermlandopera.com/kalendarium-2025-2026/"
    scraper:
      type: "static"
      method: "beautifulsoup"
      selectors:
        event: ".event-item, .program-item"
        title: "h2, h3, .event-title"
        date: ".date, time"
        link: "a[href]"
    active: true

  karlstad_ccc:
    name: "Karlstad CCC"
    location: "Karlstad"
    type: ["Konserter", "Mässor", "Kongress"]
    urls:
      events: "https://www.karlstadccc.se/17/38/program-biljetter/"
    scraper:
      type: "static"
      method: "beautifulsoup"
    active: true

  scalateatern:
    name: "Scalateatern"
    location: "Karlstad"
    type: ["Teater", "Konserter", "Stand-up"]
    urls:
      events: "https://www.scalateatern.com/vara-evenemang/"
      tickets: "https://www.ticketmaster.se/venue/scalateatern-karlstad-biljetter/scl/416"
    scraper:
      type: "static"
      method: "beautifulsoup"
    active: true

  nojesfabriken:
    name: "Nöjesfabriken"
    location: "Karlstad"
    type: ["Klubb", "Konserter", "Quiz", "Live music"]
    urls:
      events: "https://www.nojesfabriken.se/nojeskalendern/"
    scraper:
      type: "dynamic"
      method: "playwright"
      wait_for: ".event-list, .calendar"
    active: true

  lofbergs_arena:
    name: "Löfbergs Arena"
    location: "Karlstad"
    type: ["Arena", "Stora evenemang", "Ishockey"]
    urls:
      home: "https://www.lofbergsarena.se/"
      tickets: "https://www.tickster.com/se/sv/events/in/karlstad"
    scraper:
      type: "external"
      source: "tickster"
    active: true

# Tier 2: Cultural Institutions
tier2_cultural:
  varmlands_museum:
    name: "Värmlands Museum"
    location: "Karlstad"
    address: "Sandgrundsudden"
    type: ["Utställningar", "Föreläsningar", "Guidade visningar", "Familjeaktiviteter"]
    urls:
      calendar: "https://varmlandsmuseum.se/evenemangskalender/"
      exhibitions: "https://varmlandsmuseum.se/utstallningar/"
    scraper:
      type: "static"
      method: "beautifulsoup"
      selectors:
        event: ".event, .activity"
        title: "h3, h4"
        date: ".date, time"
    active: true

  sandgrund_lars_lerin:
    name: "Sandgrund Lars Lerin"
    location: "Karlstad"
    type: ["Konsthall", "Permanent utställning"]
    urls:
      home: "https://sandgrund.org/"
    scraper:
      type: "manual"
      note: "Permanent exhibition, check for rotating exhibitions"
    active: true

  bibliotekshuset:
    name: "Bibliotekshuset"
    location: "Karlstad"
    type: ["Föreläsningar", "Film", "Kultur", "Workshops"]
    urls:
      calendar: "https://karlstad.se/uppleva-och-gora/bibliotek/kalender-for-biblioteken-i-karlstad"
    scraper:
      type: "static"
      method: "beautifulsoup"
    active: true

  mariebergsskogen:
    name: "Mariebergsskogen"
    location: "Karlstad"
    type: ["Friluftsteater", "Natur", "Familjeaktiviteter", "Valborg"]
    urls:
      events: "https://karlstad.se/mariebergsskogen/evenemang"
      summer_theater: "https://www.scalateatern.com/"  # Friluftsteatern
    scraper:
      type: "static"
      method: "beautifulsoup"
    active: true

