# Tier 4: Aggregators & External Sources
tier4_aggregators:
  ticketmaster:
    name: "Ticketmaster"
    type: "aggregator"
    urls:
      karlstad: "https://www.ticketmaster.se/discover/karlstad"
    api:
      available: true
      endpoint: "https://app.ticketmaster.com/discovery/v2/events.json"
      auth: "apikey"
      docs: "https://developer.ticketmaster.com/"
    scraper:
      type: "api"
      method: "rest"
    active: true

  tickster:
    name: "Tickster"
    type: "aggregator"
    urls:
      karlstad: "https://www.tickster.com/se/sv/events/in/karlstad"
    scraper:
      type: "static"
      method: "beautifulsoup"
      note: "No public API, HTML scraping only"
    active: true

  karlstad_com:
    name: "Karlstad.com"
    type: "local_aggregator"
    urls:
      events: "https://www.karlstad.com/evenemang"
    scraper:
      type: "dynamic"
      method: "playwright"
      note: "Filters by Ticketmaster, Tickster, Nöje.se"
    active: true

  stadsevent:
    name: "Stadsevent"
    type: "local_aggregator"
    urls:
      karlstad: "https://stadsevent.se/karlstad/"
    scraper:
      type: "static"
      method: "beautifulsoup"
    active: true

  noje_se:
    name: "Nöje.se"
    type: "national_aggregator"
    urls:
      karlstad: "https://www.noje.se/karlstad/evenemang"
    scraper:
      type: "static"
      method: "beautifulsoup"
    active: true

