<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Events - Evenemang Karlstad</title>
  <meta name="description" content="Evenemang och happenings i Karlstad med omnejd">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; line-height: 1.6; color: #333; background: #f5f5f5; }
    header { background: #1a365d; color: white; padding: 1rem 2rem; }
    header .logo { color: white; text-decoration: none; font-size: 1.5rem; font-weight: bold; }
    .hero-section { background: linear-gradient(135deg, #1a365d 0%, #2c5282 100%); color: white; padding: 3rem 2rem; text-align: center; }
    .hero-section h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .hero-section .subtitle { font-size: 1.2rem; opacity: 0.9; }
    .hero-section .updated { font-size: 0.9rem; opacity: 0.7; margin-top: 1rem; }
    .events-section { padding: 2rem; max-width: 1200px; margin: 0 auto; }
    .events-section h2 { font-size: 1.8rem; margin-bottom: 1.5rem; color: #1a365d; }
    .events-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.5rem; }
    .event-card { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; }
    .event-card:hover { transform: translateY(-4px); box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
    .event-date { background: #1a365d; color: white; padding: 1rem; display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 80px; }
    .event-date .day { font-size: 2rem; font-weight: bold; line-height: 1; }
    .event-date .month { font-size: 0.9rem; text-transform: uppercase; }
    .event-content { padding: 1.25rem; flex: 1; }
    .event-content h3 { font-size: 1.2rem; margin-bottom: 0.5rem; color: #1a365d; }
    .event-venue, .event-location, .event-time { font-size: 0.9rem; color: #666; margin-bottom: 0.25rem; }
    .event-description { margin: 0.75rem 0; font-size: 0.95rem; color: #444; }
    .event-link { display: inline-block; background: #2c5282; color: white; padding: 0.5rem 1rem; border-radius: 6px; text-decoration: none; font-size: 0.9rem; transition: background 0.2s; }
    .event-link:hover { background: #1a365d; }
    .no-events { text-align: center; padding: 3rem; color: #666; font-size: 1.1rem; }
    .areas-section { background: white; padding: 2rem; margin-top: 2rem; }
    .areas-section h2 { text-align: center; margin-bottom: 1rem; }
    .areas-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.5rem; }
    .area-tag { background: #edf2f7; color: #2d3748; padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.9rem; }
    footer { background: #1a365d; color: white; text-align: center; padding: 1.5rem; margin-top: 2rem; }
    @media (max-width: 600px) {
      .events-grid { grid-template-columns: 1fr; }
      .event-card { flex-direction: column; }
      .event-date { flex-direction: row; gap: 0.5rem; padding: 0.75rem; }
      .event-date .day { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  
  <header>
    <nav>
      <a href="/" class="logo">🏠 Karlstad Events</a>
    </nav>
  </header>
  
  
  <main>
    
<section class="events-section">
  <h2>Events</h2>
  
</section>

  </main>
  
  <footer>
    <p>Samlar evenemang från Karlstad med omnejd • Uppdateras varje måndag</p>
    <p style="font-size: 0.8rem; opacity: 0.7; margin-top: 0.5rem;">Drivs av OpenClaw</p>
  </footer>
</body>
</html>
