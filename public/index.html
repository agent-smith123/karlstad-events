      const allCount = events.length;
      const allPill = makePill('all', 'Alla', allCount);
      bar.appendChild(allPill);

      
      const seen = new Set();
      const ordered = [...CAT_ORDER, ...Object.keys(counts).filter(c => !CAT_ORDER.includes(c))];
      for (const cat of ordered) {
        if (seen.has(cat) || !counts[cat]) continue;
        seen.add(cat);
        const label = CAT_LABELS[cat] || cat;
        bar.appendChild(makePill(cat, label, counts[cat]));
      }
    }

    function makePill(cat, label, count) {
      const btn = document.createElement('button');
      btn.className = 'filter-pill' + (activeCategories.has(cat) ? ' active' : '');
      btn.dataset.cat = cat;
      btn.innerHTML = label + ' <span class="count">' + count + '</span>';
      btn.addEventListener('click', () => onPillClick(cat));
      return btn;
    }

    function onPillClick(cat) {
      if (cat === 'all') {
        activeCategories = new Set(['all']);
      } else {
        activeCategories.delete('all');
        if (activeCategories.has(cat)) {
          activeCategories.delete(cat);
          if (activeCategories.size === 0) activeCategories = new Set(['all']);
        } else {
          activeCategories.add(cat);
        }
      }
      
      document.querySelectorAll('.filter-pill').forEach(p => {
        p.classList.toggle('active', activeCategories.has(p.dataset.cat));
      });
      renderList();
    }

    

    function renderList() {
      const list = document.getElementById('event-list');
      list.innerHTML = '';

      const filtered = activeCategories.has('all')
        ? events
        : events.filter(e => activeCategories.has(e.category || 'other'));

      
      const sorted = [...filtered].sort((a, b) => a.date.localeCompare(b.date));

      if (sorted.length === 0) {
        const li = document.createElement('li');
        li.className = 'empty';
        li.textContent = 'Inga evenemang hittades';
        list.appendChild(li);
        document.getElementById('event-count').textContent = '0';
        return;
      }

      let currentMonth = '';
      for (const ev of sorted) {
        const [y, m, d] = ev.date.split('-').map(Number);
        const monthLabel = MONTHS[m - 1] + ' ' + y;
        if (monthLabel !== currentMonth) {
          currentMonth = monthLabel;
          const divider = document.createElement('li');
          divider.className = 'month-divider';
          divider.textContent = monthLabel;
          list.appendChild(divider);
        }
        list.appendChild(buildEventRow(ev));
      }

      document.getElementById('event-count').textContent = filtered.length;
    }

    function buildEventRow(ev) {
      const [sy, sm, sd] = ev.date.split('-').map(Number);

      
      let dateHTML;
      if (ev.end_date) {
        const [ey, em, ed] = ev.end_date.split('-').map(Number);
        const sameMonth = sm === em;
        const rangeStr = sameMonth
          ? sd + '–' + ed
          : sd + '/' + sm + '–' + ed + '/' + em;
        const wdStart = weekdaySv(ev.date);
        const wdEnd = weekdaySv(ev.end_date);
        dateHTML = '<span class="date-day date-range">' + rangeStr + '</span>'
                 + '<span class="date-weekday">' + wdStart + '–' + wdEnd + '</span>';
      } else {
        const wd = weekdaySv(ev.date);
        dateHTML = '<span class="date-day">' + sd + '</span>'
                 + '<span class="date-weekday">' + wd + '</span>';
      }

      const venueText = ev.venue + (ev.location ? ', ' + ev.location : '');
      const titleText = esc(ev.title);

      const inner =
        '<li class="event-item">' +
          '<div class="date">' + dateHTML + '</div>' +
          '<div class="event-content">' +
            '<div class="event-title">' + titleText + '</div>' +
            '<div class="venue">' + esc(venueText) + '</div>' +
          '</div>' +
        '</li>';

      if (ev.link) {
        const a = document.createElement('a');
        a.href = ev.link;
        a.target = '_blank';
        a.rel = 'noopener';
        a.className = 'event-link';
        a.innerHTML = inner;
        return a;
      } else {
        const frag = document.createRange().createContextualFragment(inner);
        return frag.firstElementChild;
      }
    }

    function esc(str) {
      return (str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    

    const counts = buildCounts(events);
    renderFilters(counts);
    renderList();

  })();
  </script>
</body>
</html>
